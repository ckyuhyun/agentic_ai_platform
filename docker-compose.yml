  # Pull the model once Ollama is healthy, then exit.
  # ollama-pull:
  #   image: curlimages/curl:latest
  #   container_name: ollama-pull
  #   depends_on:
  #     ollama:
  #       condition: service_healthy
  #   entrypoint: ["/bin/sh", "-c"]
  #   command:
  #     - |
  #       curl -f --no-buffer -X POST http://ollama:11434/api/pull -d '{"name": "llama3.1"}' &&
  #       curl -f --no-buffer -X POST http://ollama:11434/api/pull -d '{"name": "nomic-embed-text:latest"}'
  #   restart: "no"
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/root/./redis-data
    command: redis-server --requirepass ${Redis_Password}
    restart: unless-stopped

  weaviate:
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --scheme
      - http
    image: cr.weaviate.io/semitechnologies/weaviate:latest
    container_name: weaviate_db
    ports:
      - "8080:8080"
      - "50051:50051"
    volumes:
      - weaviate_data:/var/lib/weaviate
    restart: unless-stopped
    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "text2vec-openai"
      # Trick the OpenAI module into hitting our local TEI container
      OPENAI_APIKEY: ""
      ENABLE_MODULES: "text2vec-openai"
      CLUSTER_HOSTNAME: "node1"
      #OLLAMA_API_ENDPOINT: "http://ollama:11434"
      API_ENDPOINT : "0.0.0.0:8000"
    depends_on:
      vllm-engine:
        condition: service_healthy

  tei-embedding-engine:
      image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest # Native CPU optimization
      container_name: tei-server
      ports:
        - "8081:80"
      environment:
        - OMP_NUM_THREADS=4
      volumes:
        - tei_data:/data
      command: --model-id BAAI/bge-large-en-v1.5 --max-client-batch-size 16
      restart: unless-stopped        

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=agnetic_ai_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:    
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    depends_on:
      vllm-engine:
        condition: service_healthy

volumes:
  weaviate_data:
  tei_data:
  vllm_data:
  redis_data:
  pgdata:
