services:

  vllm-engine:
    image: vllm/vllm-openai:latest # Or vllm/vllm-openvino if utilizing CPU/Intel optimizations
    container_name: vllm-server
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - OMP_NUM_THREADS=14 # Match your CPU physical cores
    volumes:
      - vllm_data:/root/.cache/huggingface
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s

    command: >
      Qwen/Qwen2.5-3B-Instruct-AWQ
      --quantization awq
      --max-model-len 4096
      --gpu-memory-utilization 0.78
      --enforce-eager
      --enable-auto-tool-choice
      --tool-call-parser hermes
      --enable-prefix-caching
      --host 0.0.0.0
      --port 8000
    ipc: host
    restart: unless-stopped
